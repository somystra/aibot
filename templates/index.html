<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>NetGlobal AI</title>
    <style>
        body { background-color: #121212; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; }
        .chat-container { width: 90%; max-width: 600px; background: #1e1e1e; padding: 20px; border-radius: 15px; margin-top: 50px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .logo { font-size: 24px; font-weight: bold; color: #007bff; margin-bottom: 10px; text-align: center; }
        #chat-box { height: 300px; overflow-y: auto; border-bottom: 1px solid #333; margin-bottom: 10px; padding: 10px; }
        input { width: 80%; padding: 10px; border-radius: 5px; border: none; }
        button { padding: 10px; background: #007bff; color: white; border: none; cursor: pointer; border-radius: 5px; }
        .footer { margin-top: auto; padding: 20px; font-size: 12px; color: #666; text-align: center; }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="logo">🌐 NetGlobal AI</div>
    <div id="chat-box"></div>
    <div style="display: flex; gap: 10px;">
        <input type="text" id="user-input" placeholder="Savolingizni yozing...">
        <button onclick="sendMessage()">Yuborish</button>
    </div>
</div>

<div class="footer">
    <p>Yaratuvchilar: Solijon Muhammadkarimov, Ulug'bek Shuxratullayev, Dilmurod Abduvaxobov</p>
    <p>&copy; 2026 NetGlobal Company</p>
</div>

<script>
    async function sendMessage() {
        const input = document.getElementById("user-input");
        const box = document.getElementById("chat-box");
        if(!input.value) return;

        box.innerHTML += `<p><b>Siz:</b> ${input.value}</p>`;
        const response = await fetch('/ask', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({message: input.value})
        });
        const data = await response.json();
        box.innerHTML += `<p style="color: #007bff;"><b>NetGlobal AI:</b> ${data.response}</p>`;
        input.value = "";
        box.scrollTop = box.scrollHeight;
    }
</script>

</body>
</html>
